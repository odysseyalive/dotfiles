name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ master ]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    name: Lint & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install ShellSpec
      run: curl -fsSL https://git.io/shellspec | sh -s -- --yes

    - name: Install Linting Tools
      run: |
        if [ "$RUNNER_OS" = "Linux" ]; then
          sudo apt-get install -y shellcheck zsh
        elif [ "$RUNNER_OS" = "macOS" ]; then
          brew install shellcheck zsh
        fi

    - name: Run Zsh Syntax Checks
      run: |
        zsh -n setup.sh setup/*.sh setup/hooks/*/*.zsh

    - name: Run ShellCheck on install.sh
      run: |
        shellcheck -s sh install.sh

    - name: Run Tests
      run: ~/.local/lib/shellspec/shellspec --shell zsh

  auto-generate:
    name: Generate Artifacts (Demo & Changelog)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
        - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd zsh
          
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '>=1.21.0'
          
      - name: Install VHS
        run: |
          go install github.com/charmbracelet/vhs@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          
      - name: Generate demo gif
        run: |
          mkdir -p assets
          vhs scripts/demo.tape

      - name: Validate generated asset
        run: |
          if [ ! -s assets/demo.gif ]; then
            echo "Error: assets/demo.gif is missing or empty!"
            exit 1
          fi

      - name: Generate Changelog
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        with:
          config: cliff.toml
          args: --unreleased
        env:
          OUTPUT: CHANGELOG.md
          
      - name: Commit changes
        id: auto_commit
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore: update generated artifacts (changelog, demo gif) [skip ci]"
          file_pattern: 'assets/*.gif CHANGELOG.md'
          branch: ${{ github.head_ref }}

      - name: Comment on PR with Demo Link
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
        if: steps.auto_commit.outputs.changes_detected == 'true'
        with:
          message: |
            ### 🎬 Setup Routing Demo GIF Updated
            
            The terminal recording and CHANGELOG have been automatically re-generated for this branch.
            
            ![VHS GIF](https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.auto_commit.outputs.commit_hash || github.sha }}/assets/demo.gif)
          comment_tag: "vhs-demo-gif"
          mode: "upsert"
