name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: Lint & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Install ShellSpec
      run: curl -fsSL https://git.io/shellspec | sh -s -- --yes

    - name: Install Linting Tools
      run: |
        if [ "$RUNNER_OS" = "Linux" ]; then
          sudo apt-get install -y shellcheck zsh
        elif [ "$RUNNER_OS" = "macOS" ]; then
          brew install shellcheck zsh
        fi

    - name: Run Zsh Syntax Checks
      run: |
        zsh -n setup.sh setup/*.sh setup/hooks/*/*.zsh

    - name: Run ShellCheck on install.sh
      run: |
        shellcheck -s sh install.sh

    - name: Run Tests
      run: ~/.local/lib/shellspec/shellspec --shell zsh

  demo:
    name: Generate Setup Demo GIF
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd zsh
          
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.21.0'
          
      - name: Install VHS
        run: |
          go install github.com/charmbracelet/vhs@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          
      - name: Generate demo gif
        run: |
          mkdir -p assets
          vhs scripts/demo.tape

      - name: Validate generated asset
        run: |
          if [ ! -s assets/demo.gif ]; then
            echo "Error: assets/demo.gif is missing or empty!"
            exit 1
          fi
          
      - name: Commit changes
        id: auto_commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update generated setup demo gif"
          file_pattern: 'assets/*.gif'
          branch: ${{ github.head_ref }}

      - name: Comment on PR with Demo Link
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            ### 🎬 Setup Routing Demo GIF Updated
            
            The terminal recording has been automatically re-generated for this branch.
            
            ![VHS GIF](https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.auto_commit.outputs.commit_hash || github.sha }}/assets/demo.gif)
          comment_tag: "vhs-demo-gif"
          mode: "upsert"
